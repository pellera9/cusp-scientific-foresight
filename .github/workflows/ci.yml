name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check scripts import cleanly
        run: |
          python -c "import ast, sys
          for f in ['scripts/eval.py', 'scripts/test_LLM.py', 'scripts/web_search.py']:
              ast.parse(open(f).read())
              print(f'{f}: OK')
          "
